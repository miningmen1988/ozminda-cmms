services:
  - type: web
    runtime: node
    name: ozminda-cmms
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CMMS_HOST
        value: 0.0.0.0
      - key: CMMS_STORAGE_DIR
        value: /tmp/ozminda-cmms
      - key: DATABASE_URL
        fromDatabase:
          name: ozminda-cmms-db
          property: connectionString

databases:
  - name: ozminda-cmms-db
    plan: free
    region: frankfurt
